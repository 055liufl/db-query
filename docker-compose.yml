# If pip fails with "Temporary failure in name resolution" during build, fix DNS in the VM first:
#   docker-machine ssh default
#   sudo sh -c 'echo nameserver 8.8.8.8 > /etc/resolv.conf'
# Optional PyPI mirror (host must still resolve the mirror domain):
#   docker-compose build --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
#                        --build-arg PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn backend
# See docker-troubleshooting.md (UTF-8) for full notes. This file must stay ASCII-only for old docker-compose on Windows (GBK).
version: "3.3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # OPENAI_*: inject via env_file (host backend/.env). Avoid bind-mounting ./backend/.env to /app/.env:
    # if host once had a directory named .env, Docker would mount a directory and break Pydantic.
    env_file:
      - ./backend/.env
    environment:
      DB_QUERY_PATH: /root/.db_query
    # Default 64MB shm can worsen thread/SSL issues under load; raise nofile for aiohttp TLS/OpenAI.
    shm_size: 512mb
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - db_query_data:/root/.db_query

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    # Leave VITE_API_BASE_URL unset so the browser uses same hostname as the page :8000 (see frontend src/services/api.ts).
    depends_on:
      - backend

volumes:
  db_query_data:
  pg_data:
